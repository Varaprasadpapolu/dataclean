# nixpacks.toml

providers = ["node", "python"]

[phases.setup]
nixPkgs = ["...", "nodejs", "python3"]

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  "cd frontend && npm install && npm run build"
]

[phases.start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
